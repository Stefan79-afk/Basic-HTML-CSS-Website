<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Site | Contact</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Developer Site Contact Page">
    <meta name="author" content="Epsilon">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="nav-brand">
                <img src="profile.jpg" alt="Epsilon's profile photo">
                <p>Epsilon</p>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
        <h1 class="page-title">Contact</h1>
    </header>

    <main>
        <div class="contact-wrapper">
            <form class="contact-form" action="#" method="post">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send message</button>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Epsilon. All rights reserved.</p>
    </footer>
</body>
</html>
